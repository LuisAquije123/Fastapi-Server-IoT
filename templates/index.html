<!DOCTYPE html>
<html>

<head>

    <title>Control de Riego</title>

    <style>

        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
        }

        .card {

            background: #1e293b;

            padding: 30px;

            border-radius: 15px;

            display: inline-block;

            margin-top: 50px;

            min-width: 350px;
        }

        .value {

            font-size: 30px;

            margin: 10px 0;
        }

        button {

            padding: 12px 20px;

            font-size: 18px;

            border: none;

            border-radius: 8px;

            cursor: pointer;

            margin-top: 20px;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>🌱 Sistema IoT de Riego</h1>

    <p>
        <strong>⚡ Bomba:</strong>
    </p>

    <div class="value" id="relay">

        {% if relay %}
            ON
        {% else %}
            OFF
        {% endif %}

    </div>

    <hr>

    <p><strong>🌱 Humedad suelo</strong></p>

    <div class="value" id="soilHumidity">
        {{ telemetry.soilHumidity }}
    </div>

    <p><strong>🌡️ Temperatura</strong></p>

    <div class="value" id="temperature">
        {{ telemetry.temperature }}
    </div>

    <p><strong>💧 Humedad ambiente</strong></p>

    <div class="value" id="airHumidity">
        {{ telemetry.airHumidity }}
    </div>

    <button onclick="toggle()">

        Cambiar estado

    </button>

</div>

<script>

const ws = new WebSocket(
    "wss://" + location.host + "/ws"
);

ws.onmessage = function(event) {

    const data = JSON.parse(event.data);

    console.log(data);

    // ======================
    // RELE
    // ======================

    document.getElementById("relay").innerText =
        data.relay ? "ON" : "OFF";

    // ======================
    // TELEMETRIA
    // ======================

    document.getElementById("soilHumidity").innerText =
        data.soilHumidity;

    document.getElementById("temperature").innerText =
        data.temperature + " °C";

    document.getElementById("airHumidity").innerText =
        data.airHumidity + " %";
};

async function toggle() {

    await fetch("/toggle", {
        method: "POST"
    });
}

</script>

</body>
</html>
