<!DOCTYPE html>
<html>
<head>
    <title>Control de Riego</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .on { background: green; }
        .off { background: red; }
    </style>
</head>
<body>

<div class="card">
    <h1>💧 Sistema de Riego</h1>

   <p><strong>Estado bomba:</strong> <span id="estado">{{ estado }}</span></p>
<p><strong>Humedad:</strong> <span id="humedad">{{ humedad }}</span></p>

    <button onclick="toggle()">Cambiar estado</button>
</div>

<script>
const ws = new WebSocket("ws://" + location.host + "/ws");

ws.onmessage = function(event) {
    const data = JSON.parse(event.data);

    document.getElementById("estado").innerText = data.estado;
    document.getElementById("humedad").innerText = data.humedad;
};

function toggle() {
    fetch('/toggle', { method: 'POST' });
}
</script>

</body>
</html>
